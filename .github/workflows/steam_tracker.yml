name: Steam Playtime Tracker

on:
  workflow_dispatch:
  schedule:
    # 05:00, 13:00, and 21:00 in Asia/Shanghai.
    - cron: "0 21,5,13 * * *"

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: collector/requirements.txt

      - name: Install dependencies
        run: pip install -r collector/requirements.txt

      - name: Collect Steam playtime
        env:
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
          STEAM_ID: ${{ secrets.STEAM_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          STEAM_TIMEZONE: Asia/Shanghai
          STEAM_COLLECTOR_SOURCE: github_actions
        run: python -m steam_playtime.collect
        working-directory: collector
